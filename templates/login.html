<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Krishi Mitra - Login</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #f0f8f0; /* light green page background */
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2e7d32; /* dark green header */
            color: white;
            padding: 30px 0;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 18px;
        }

        h2 {
            color: #2e7d32;
            margin-top: 40px;
        }

        form {
            display: inline-block;
            margin-top: 20px;
            padding: 30px;
            border: 2px solid #2e7d32;
            border-radius: 10px;
            background-color: #ffffff; /* white form background */
        }

        input {
            padding: 10px;
            width: 250px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <!-- Header with green background -->
    <header>
        <h1>🌱 KRISHI MITRA</h1>
        <p>Smart Farming Advisory System</p>
    </header>

    <!-- Login Section -->
    <h2>User Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/">
        <input type="text" name="farmer_id" placeholder="Enter Farmer ID" required><br>
        <input type="password" name="password" placeholder="Enter Password" required><br>
        <button type="submit">Login</button>
    </form>

</body>
</html>
